<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 300px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        color: #333;
        margin: 0;
      }

      h2 {
        margin: 0 0 12px 0;
        font-size: 16px;
        color: #4a90d9;
      }

      label {
        display: block;
        margin-bottom: 4px;
        font-weight: 600;
        font-size: 12px;
      }

      input[type="password"],
      input[type="text"] {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 13px;
        box-sizing: border-box;
      }

      input:focus {
        outline: none;
        border-color: #4a90d9;
      }

      button {
        margin-top: 12px;
        width: 100%;
        padding: 8px;
        background: #4a90d9;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        cursor: pointer;
      }

      button:hover {
        background: #3a7bc8;
      }

      .status {
        margin-top: 8px;
        font-size: 12px;
        text-align: center;
      }

      .status-success {
        color: #27ae60;
      }

      .status-info {
        color: #666;
      }
    </style>
  </head>
  <body>
    <h2>AI Translator 설정</h2>
    <label for="api-key">Claude API 키</label>
    <input type="password" id="api-key" placeholder="sk-ant-..." />
    <button id="save-btn">저장</button>
    <div id="status" class="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
