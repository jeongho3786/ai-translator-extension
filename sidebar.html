<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.6;
      color: #333;
      background: #f8f9fa;
      padding: 16px;
    }

    .ai-translator-sidebar-header {
      font-size: 16px;
      font-weight: 700;
      color: #4a90d9;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #4a90d9;
    }

    .ai-translator-sidebar-empty {
      color: #999;
      text-align: center;
      margin-top: 24px;
      margin-bottom: 24px;
    }

    .ai-translator-sidebar-settings {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 16px;
      margin-top: 16px;
    }

    .ai-translator-sidebar-settings-title {
      font-size: 13px;
      font-weight: 700;
      color: #4a90d9;
      margin-bottom: 8px;
    }

    .ai-translator-sidebar-settings label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #555;
    }

    .ai-translator-sidebar-settings input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      box-sizing: border-box;
    }

    .ai-translator-sidebar-settings input:focus {
      outline: none;
      border-color: #4a90d9;
    }

    .ai-translator-sidebar-hero {
      background: #4a90d9;
      color: #fff;
      padding: 24px 16px;
      border-radius: 10px;
      margin-bottom: 16px;
    }

    .ai-translator-sidebar-hero-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .ai-translator-sidebar-subtitle {
      font-size: 13px;
      opacity: 0.9;
    }

    .ai-translator-sidebar-guide {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .ai-translator-sidebar-guide-title {
      font-size: 13px;
      font-weight: 700;
      color: #4a90d9;
      margin-bottom: 12px;
    }

    .ai-translator-sidebar-guide-item {
      padding: 8px 0;
    }

    .ai-translator-sidebar-guide-item + .ai-translator-sidebar-guide-item {
      border-top: 1px solid #f0f0f0;
    }

    .ai-translator-sidebar-guide-item-title {
      font-size: 13px;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 2px;
    }

    .ai-translator-sidebar-guide-item-desc {
      font-size: 12px;
      color: #888;
    }

    .ai-translator-sidebar-save-btn {
      margin-top: 8px;
      width: 100%;
      padding: 8px;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
    }

    .ai-translator-sidebar-save-btn:hover {
      background: #357abd;
    }

    .ai-translator-sidebar-status {
      margin-top: 6px;
      font-size: 12px;
      text-align: center;
    }

    .ai-translator-sidebar-status-success {
      color: #27ae60;
    }

    .ai-translator-sidebar-status-info {
      color: #666;
    }

    .ai-translator-sidebar-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 40px;
    }

    .ai-translator-sidebar-spinner {
      width: 24px;
      height: 24px;
      border: 3px solid #e0e0e0;
      border-top: 3px solid #4a90d9;
      border-radius: 50%;
      animation: ai-translator-sidebar-spin 0.8s linear infinite;
    }

    @keyframes ai-translator-sidebar-spin {
      to { transform: rotate(360deg); }
    }

    .ai-translator-sidebar-original {
      background: #fff;
      border-left: 3px solid #4a90d9;
      padding: 8px 12px;
      margin-bottom: 16px;
      font-style: italic;
      color: #555;
      word-break: break-word;
    }

    .ai-translator-sidebar-section {
      margin-bottom: 16px;
    }

    .ai-translator-sidebar-section-title {
      font-size: 13px;
      font-weight: 700;
      color: #4a90d9;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .ai-translator-sidebar-translation {
      background: #e8f4fd;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 16px;
    }

    .ai-translator-sidebar-structure-item {
      display: flex;
      gap: 8px;
      padding: 4px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .ai-translator-sidebar-role {
      background: #4a90d9;
      color: #fff;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 12px;
      white-space: nowrap;
      align-self: flex-start;
    }

    .ai-translator-sidebar-structure-text {
      flex: 1;
    }

    .ai-translator-sidebar-structure-meaning {
      color: #888;
      font-size: 13px;
    }

    .ai-translator-sidebar-chunk-item {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .ai-translator-sidebar-chunk-text {
      font-weight: 500;
    }

    .ai-translator-sidebar-chunk-meaning {
      color: #666;
    }

    .ai-translator-sidebar-grammar-item {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 8px;
    }

    .ai-translator-sidebar-grammar-point {
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 2px;
    }

    .ai-translator-sidebar-grammar-explanation {
      color: #666;
      font-size: 13px;
    }

    .ai-translator-sidebar-kanji-item {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .ai-translator-sidebar-kanji-text {
      font-size: 18px;
      font-weight: 700;
      color: #2c3e50;
    }

    .ai-translator-sidebar-kanji-reading {
      font-size: 13px;
      color: #e67e22;
    }

    .ai-translator-sidebar-kanji-meaning {
      font-size: 13px;
      color: #666;
    }

    .ai-translator-sidebar-sentence-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .ai-translator-sidebar-sentence-original {
      font-weight: 500;
      margin-bottom: 4px;
      word-break: break-word;
    }

    .ai-translator-sidebar-sentence-translation {
      color: #666;
      margin-bottom: 8px;
    }

    .ai-translator-sidebar-analyze-btn {
      background: #4a90d9;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    .ai-translator-sidebar-analyze-btn:hover {
      background: #357abd;
    }

    .ai-translator-sidebar-analyze-btn:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    .ai-translator-sidebar-error {
      color: #e74c3c;
      background: #fdf0ef;
      padding: 8px 12px;
      border-radius: 6px;
      margin-top: 16px;
    }

    .ai-translator-sidebar-back-btn {
      background: none;
      border: 1px solid #4a90d9;
      color: #4a90d9;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .ai-translator-sidebar-back-btn:hover {
      background: #f0f7ff;
    }
  </style>
</head>
<body>
  <div class="ai-translator-sidebar-header" id="sidebar-header">AI 문장 번역기</div>
  <div id="content"></div>
  <script src="sidebar.js"></script>
</body>
</html>
